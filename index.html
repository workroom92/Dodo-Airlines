<title>Dodo Airlines — 도도 항공에 탑승하세요</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#128ECC;--sky-deep:#0E7AB5;--sky-light:#4AAEDD;
  --sky-pale:#B8DCF5;--sky-bg:#E4F2FA;
  --white:#FFFFFF;--yellow:#EDD535;--yellow-dim:#C9B420;
  --panel:#F4FBFE;--text-dark:#1A5F75;--text-mid:#3A8FA8;
  --text-soft:#7EC5D8;--border:rgba(18,142,204,0.2);--hover:rgba(18,142,204,0.08);
}
html,body{height:100%;background:var(--sky-bg);color:var(--text-dark);font-family:'Nunito',sans-serif;overflow:hidden}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:300px 1fr;grid-template-rows:58px 1fr;height:100vh}

/* ── HEADER ── */
header{
  grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:var(--sky);border-bottom:2px solid var(--sky-deep);z-index:100;
}
.logo-img{height:42px;object-fit:contain;mix-blend-mode:screen}
.header-right{display:flex;align-items:center;gap:12px}
.by-label{font-size:11px;color:rgba(255,255,255,0.55);font-weight:700;letter-spacing:0.08em}
/* hamburger — mobile only */
.menu-btn{
  display:none;background:rgba(255,255,255,0.2);border:none;
  color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;
  font-size:18px;align-items:center;justify-content:center;
}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform 0.3s ease;
}
.sidebar-top{padding:12px 14px 10px;border-bottom:1px solid var(--border);background:var(--white)}
.s-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-soft);font-weight:700;margin-bottom:8px}
.s-search{position:relative}
.s-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
.s-search input{
  width:100%;background:var(--sky-bg);border:1.5px solid var(--border);border-radius:20px;
  padding:7px 12px 7px 32px;font-family:'Nunito',sans-serif;font-size:13px;color:var(--text-dark);
  outline:none;transition:border-color 0.2s;
}
.s-search input::placeholder{color:var(--text-soft)}
.s-search input:focus{border-color:var(--sky)}
.dest-list{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--sky-pale) transparent}
.dest-list::-webkit-scrollbar{width:4px}
.dest-list::-webkit-scrollbar-thumb{background:var(--sky-pale);border-radius:2px}
.region-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--sky);font-weight:800;padding:14px 14px 5px;display:flex;align-items:center;gap:6px}
.region-label::before{content:'';display:inline-block;width:16px;height:1.5px;background:var(--sky-pale)}
.dest-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:background 0.12s}
.dest-item:hover{background:var(--hover)}
.dest-item.active{background:rgba(18,142,204,0.1);border-left-color:var(--sky)}
.d-icon{font-size:22px;width:30px;text-align:center;flex-shrink:0}
.d-info{flex:1;min-width:0}
.d-city{font-size:13px;font-weight:700;color:var(--text-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dest-item.active .d-city{color:var(--sky-deep)}
.d-place{font-size:11px;color:var(--text-soft);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-tag{font-size:10px;padding:2px 7px;border-radius:10px;border:1.5px solid;flex-shrink:0;font-weight:700}
.tag-nature  {color:#2d9e58;border-color:rgba(45,158,88,0.35);background:rgba(45,158,88,0.08)}
.tag-city    {color:#2c7fc4;border-color:rgba(44,127,196,0.35);background:rgba(44,127,196,0.08)}
.tag-heritage{color:#c4732c;border-color:rgba(196,115,44,0.35);background:rgba(196,115,44,0.08)}
.tag-coast   {color:#1aa3b5;border-color:rgba(26,163,181,0.35);background:rgba(26,163,181,0.08)}
.no-results{padding:20px 14px;font-size:13px;color:var(--text-soft);text-align:center;display:none;font-weight:600}

/* ── MAIN ── */
.main{position:relative;overflow:hidden;background:#000}
#streetFrame{width:100%;height:100%;border:none;display:block;transition:opacity 0.5s}

/* ── OVERLAY INFO ── */
.ov-info{position:absolute;bottom:26px;left:20px;pointer-events:none;z-index:5}
.ov-tag{display:inline-block;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--yellow);font-weight:800;background:rgba(10,60,80,0.75);padding:3px 10px;border-radius:10px;margin-bottom:8px;border:1.5px solid rgba(237,213,53,0.4)}
.ov-title{font-size:30px;font-weight:800;line-height:1.1;text-shadow:0 2px 16px rgba(0,0,0,0.7);color:#fff;margin-bottom:4px}
.ov-sub{font-size:12px;color:rgba(255,255,255,0.65);font-weight:600;text-shadow:0 1px 8px rgba(0,0,0,0.8)}

/* ── CONTROLS ── */
.controls{position:absolute;top:12px;right:12px;z-index:5;display:flex;gap:6px}
.ctrl-btn{
  background:rgba(255,255,255,0.88);border:1.5px solid rgba(18,142,204,0.3);
  color:var(--sky-deep);width:36px;height:36px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;transition:background 0.12s;
}
.ctrl-btn:hover{background:var(--yellow);border-color:var(--yellow-dim);color:var(--text-dark)}

/* ── LOADING ── */
.loading-overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:var(--sky-bg);z-index:20;transition:opacity 0.4s;
}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.spin-ring{
  width:44px;height:44px;
  border:3px solid var(--sky-pale);
  border-top-color:var(--sky);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-label{font-size:14px;font-weight:700;color:var(--text-mid)}

/* ── EMPTY ── */
.empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:1;background:#128ECC}
.empty-dodo{animation:floatY 3s ease-in-out infinite;display:block}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty-state h2{font-size:20px;font-weight:800;color:#fff}
.empty-state p{font-size:13px;color:rgba(255,255,255,0.5);text-align:center;line-height:1.9;font-weight:600}

/* ── FALLBACK ── */
.fallback{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:15;background:var(--sky-bg)}
.fallback h3{font-size:17px;color:var(--text-mid);font-weight:800}
.fallback p{font-size:12px;color:var(--text-soft);text-align:center;max-width:300px;line-height:1.8;font-weight:600}
.fallback-btn{display:inline-block;background:var(--sky);border:none;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;padding:10px 22px;border-radius:20px;cursor:pointer;text-decoration:none;transition:background 0.15s}
.fallback-btn:hover{background:var(--sky-deep)}

/* ── MOBILE OVERLAY BACKDROP ── */
.sidebar-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:49;
}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .app{grid-template-columns:1fr;grid-template-rows:58px 1fr}
  .menu-btn{display:flex}
  .sidebar{
    position:fixed;top:58px;left:0;bottom:0;width:85%;max-width:320px;
    z-index:50;transform:translateX(-100%);
    box-shadow:4px 0 20px rgba(0,0,0,0.15);
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop.open{display:block}
  .ov-title{font-size:22px}
  .controls{top:10px;right:10px;gap:5px}
  .ctrl-btn{width:32px;height:32px;font-size:13px}
}
</style>
</head>

  { region:"아메리카",  icon:"🇺🇸", city:"뉴욕",          country:"미국",       place:"타임스 스퀘어",     tag:"city",     lat:40.757977,  lng:-73.985559, h:0,   p:0  },
  // 할리우드 사인 뷰포인트 트레일
  { region:"아메리카",  icon:"🇺🇸", city:"로스앤젤레스",  country:"미국",       place:"할리우드 사인",     tag:"city",     lat:34.136680,  lng:-118.321490,h:200, p:10 },
  // 링컨 기념관 계단 위에서 내셔널 몰 방향
  { region:"아메리카",  icon:"🇺🇸", city:"워싱턴 D.C.",   country:"미국",       place:"링컨 기념관",       tag:"heritage", lat:38.889390,  lng:-77.050150, h:90,  p:5  },
  // 코파카바나 해변 산책로
  { region:"아메리카",  icon:"🇧🇷", city:"리우데자네이루", country:"브라질",    place:"코파카바나 해변",   tag:"coast",    lat:-22.971270, lng:-43.183560, h:220, p:0  },
  // 마추픽추 트레커 뷰포인트 (잉카 트레일 입구)
  { region:"아메리카",  icon:"🇵🇪", city:"마추픽추",      country:"페루",       place:"잉카 공중 도시",    tag:"heritage", lat:-13.164700, lng:-72.546900, h:40,  p:10 },
  // 오페라 하우스 외부 산책로
  { region:"오세아니아",icon:"🇦🇺", city:"시드니",        country:"호주",       place:"오페라 하우스",     tag:"heritage", lat:-33.857350, lng:151.213700, h:60,  p:5  },
  // 테이블 마운틴 정상 야외
  { region:"아프리카",  icon:"🇿🇦", city:"케이프타운",    country:"남아프리카", place:"테이블 마운틴",     tag:"nature",   lat:-33.957500, lng:18.403800,  h:350, p:5  },
  // 기자 피라미드 전경 뷰포인트
  { region:"아프리카",  icon:"🇪🇬", city:"카이로",        country:"이집트",     place:"기자 피라미드",     tag:"heritage", lat:29.977760,  lng:31.132710,  h:230, p:5  },
];

const TAG_LABEL = { city:"도시", nature:"자연", heritage:"유산", coast:"해안" };
let current = -1, errTimer = null;

function buildURL(d) {
  return `https://maps.google.com/maps?layer=c&cbll=${d.lat},${d.lng}&cbp=12,${d.h},0,0,${d.p}&ie=UTF8&output=svembed`;
}
function buildMapsLink(d) {
  return `https://www.google.com/maps/@${d.lat},${d.lng},3a,80y,${d.h}h,${90+d.p}t/data=!3m6!1e1!3m4!1s0!2e0!7i16384!8i8192`;
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("backdrop").classList.remove("open");
}

function renderList(filter="") {
  const list = document.getElementById("destList");
  const noResults = document.getElementById("noResults");
  list.innerHTML = "";
  let shown=0, lastRegion="";
  DESTS.forEach((d,i) => {
    if (filter && ![d.city,d.country,d.place,d.region].some(s=>s.includes(filter))) return;
    shown++;
    if (d.region !== lastRegion) {
      lastRegion = d.region;
      const lbl = document.createElement("div");
      lbl.className="region-label"; lbl.textContent=d.region;
      list.appendChild(lbl);
    }
    const el = document.createElement("div");
    el.className="dest-item"+(i===current?" active":"");
    el.dataset.i=i;
    el.innerHTML=`
      <div class="d-icon">${d.icon}</div>
      <div class="d-info">
        <div class="d-city">${d.city}</div>
        <div class="d-place">${d.place} · ${d.country}</div>
      </div>
      <span class="d-tag tag-${d.tag}">${TAG_LABEL[d.tag]}</span>`;
    el.onclick=()=>{ load(i); closeSidebar(); };
    list.appendChild(el);
  });
  noResults.style.display=shown?"none":"block";
}

function load(i) {
  const d=DESTS[i]; if(!d) return;
  current=i;
  document.querySelectorAll(".dest-item").forEach(el=>el.classList.toggle("active",+el.dataset.i===i));
  const frame=document.getElementById("streetFrame");
  const loading=document.getElementById("loadingOverlay");
  const empty=document.getElementById("emptyState");
  const fallback=document.getElementById("fallback");
  const ov=document.getElementById("ovInfo");
  empty.style.display="none";
  fallback.style.display="none";
  ov.style.display="none";
  frame.style.opacity="0";
  loading.classList.remove("hidden");
  document.getElementById("spinLabel").textContent=`${d.city}으로 출발! ✈`;
  document.getElementById("fallbackLink").href=buildMapsLink(d);
  clearTimeout(errTimer);
  errTimer=setTimeout(()=>{
    if(parseFloat(frame.style.opacity)<1){
      loading.classList.add("hidden");
      fallback.style.display="flex";
    }
  },12000);
  frame.onload=()=>{
    clearTimeout(errTimer);
    setTimeout(()=>{
      loading.classList.add("hidden");
      frame.style.opacity="1";
      document.getElementById("ovTag").textContent=d.region+" — "+TAG_LABEL[d.tag];
      document.getElementById("ovTitle").textContent=d.city;
      document.getElementById("ovSub").textContent=d.place+"  ·  "+d.country;
      ov.style.display="block";
    },500);
  };
  frame.src=buildURL(d);
}

document.getElementById("menuBtn").onclick=()=>{
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("backdrop").classList.toggle("open");
};
document.getElementById("backdrop").onclick=closeSidebar;
document.getElementById("prevBtn").onclick=()=>load(current<=0?DESTS.length-1:current-1);
document.getElementById("nextBtn").onclick=()=>load((current+1)%DESTS.length);
document.getElementById("randBtn").onclick=()=>{let r;do{r=Math.floor(Math.random()*DESTS.length)}while(r===current);load(r)};
document.getElementById("fullBtn").onclick=()=>{
  const m=document.querySelector(".main");
  document.fullscreenElement?document.exitFullscreen():m.requestFullscreen?.();
};
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") document.getElementById("nextBtn").click();
  if(e.key==="ArrowLeft")  document.getElementById("prevBtn").click();
  if(e.key==="r"||e.key==="R") document.getElementById("randBtn").click();
});
document.getElementById("searchInput").oninput=e=>renderList(e.target.value.trim());
renderList();
</script>
</body>
</html>
